<section class="form" [formGroup]="loginForm">
  <div class="container">
    <div class="form__content">
      <h1 class="form__title common-title"><span>Вход</span> в систему</h1>
      <div class="form__details">
        <div class="form__group">
          <input
            type="text"
            class="form__input"
            id="email"
            name="email"
            placeholder=""
            formControlName="email"
          />
          <label for="email" class="form__label">Электронная почта</label>
        </div>
        <div class="form__group">
          <input
            type="password"
            class="form__input"
            id="password"
            name="password"
            placeholder=""
            formControlName="password"
          />
          <label for="password" class="form__label">Пароль</label>
        </div>
      </div>
      <div class="form__button">
        <button id="process" class="button" [disabled]="loginForm.invalid" (click)="login()">
          Перейти к выбору теста
        </button>
      </div>
      <div class="form__link">Нет аккаунта? <a routerLink="/signup">Зарегистрироваться</a></div>
    </div>
    <div class="form__image">
      <img
        ngSrc="./assets/images/info-image.svg"
        alt="Person"
        width="523"
        height="547"
        loading="lazy"
      />
    </div>
  </div>
</section>
